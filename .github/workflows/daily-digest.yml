name: Daily AI/IT Digest

on:
  schedule:
    # 08:00 JST = 23:00 UTC (previous day)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser groq

      - name: Generate digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_digest.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name "news-digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add digests archive index.html data/published_topics.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "digest: $(date -u -d '+9 hours' +%Y-%m-%d)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Sends a push notification via ntfy.sh when a new digest was published.
      # Requires the NTFY_TOPIC secret (see README). Tapping the notification
      # opens the GitHub Pages site. Never fails the workflow.
      - name: Notify phone via ntfy
        if: steps.commit.outputs.changed == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC secret not set; skipping notification"
            exit 0
          fi
          DATE=$(date -u -d '+9 hours' +%Y-%m-%d)
          COUNT=$(grep -oP '掲載トピック数: \K[0-9]+' "digests/${DATE}.md" || echo "?")
          # give GitHub Pages a moment to deploy so the tapped link shows today's digest
          sleep 90
          jq -n \
            --arg topic "$NTFY_TOPIC" \
            --arg title "📰 Daily Digest ${DATE} 更新" \
            --arg message "本日のダイジェスト（${COUNT}件）を公開しました。タップして開く" \
            '{topic: $topic, title: $title, message: $message,
              click: "https://liuxi4048-crypto.github.io/news-digest/",
              tags: ["newspaper"]}' \
            | curl -fsS -H "Content-Type: application/json" -d @- https://ntfy.sh \
            || echo "::warning::ntfy notification failed"
