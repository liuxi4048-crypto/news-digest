name: Daily AI/IT Digest

on:
  schedule:
    # 08:00 JST = 23:00 UTC (previous day)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser groq

      - name: Generate digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_digest.py

      - name: Export Obsidian notes
        run: python scripts/export_obsidian.py

      - name: Commit and push
        run: |
          git config user.name "news-digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add digests archive index.html data/published_topics.json obsidian
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "digest: $(date -u -d '+9 hours' +%Y-%m-%d)"
          git push
